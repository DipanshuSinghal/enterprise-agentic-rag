version: '3.8'

services:
  # Vector Database Engine
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # FastAPI Agentic Streaming Backend
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant

  # Streamlit Interface Layer
  frontend:
    build: .
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "src/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - backend

volumes:
  qdrant_storage: