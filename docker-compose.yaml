version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: enterprise-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/vector_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ANALYTICS_TRACKING=false
    restart: always